services:
  postgres:
    image: postgres:17-alpine
    container_name: produto-crud-postgres
    environment:
      POSTGRES_DB: produto_crud
      POSTGRES_USER: produto
      POSTGRES_PASSWORD: produto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: produto-crud-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: produto_crud
      DB_USERNAME: produto
      DB_PASSWORD: produto
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    command: ["sh", "./docker/php/start.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f storage/framework/backend-ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  nginx:
    image: nginx:1.29-alpine
    container_name: produto-crud-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: produto-crud-frontend
    working_dir: /app
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
